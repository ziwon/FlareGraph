name: Deploy

# Manual deploys only — set the CLOUDFLARE_API_TOKEN repository secret
# (Workers Scripts:Edit, D1:Edit, Queues:Edit, Vectorize:Edit, Workers AI:Read).
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - name: Apply D1 migrations
        working-directory: apps/worker
        run: pnpm exec wrangler d1 migrations apply flaregraph --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Deploy worker
        working-directory: apps/worker
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
