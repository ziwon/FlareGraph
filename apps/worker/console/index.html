<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FlareGraph</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <header>
    <svg class="mark" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle cx="5" cy="18" r="2.4" stroke="#53D0C5" stroke-width="1.5"/>
      <circle cx="12" cy="5.5" r="2.4" stroke="#6E8BFF" stroke-width="1.5"/>
      <circle cx="19" cy="18" r="2.4" stroke="#8B6DFF" stroke-width="1.5"/>
      <path d="M6.4 16.2 10.7 7.6M13.3 7.6l4.3 8.6M7.4 18h9.2" stroke="#33405A" stroke-width="1.5"/>
    </svg>
    <span class="name">FlareGraph</span>
    <span class="host" id="host"></span>
    <div class="stats">
      <div class="stat"><b id="stat-pages">–</b><span>pages</span></div>
      <div class="stat"><b id="stat-indexed">–</b><span>last indexed</span></div>
      <div class="dot" id="health-dot" title="index health"></div>
    </div>
  </header>

  <section class="search">
    <h1>Search your vault</h1>
    <p class="sub">Keyword, semantic, and graph retrieval over the Obsidian mirror.</p>
    <div class="searchbox">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.5"/>
        <path d="m16.5 16.5 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input id="q" type="search" placeholder="Search notes… (Korean and English)" autocomplete="off" autofocus>
    </div>
    <div class="controls">
      <div class="modes" id="modes" role="tablist">
        <button type="button" class="on" data-mode="hybrid">Hybrid</button>
        <button type="button" data-mode="keyword">Keyword</button>
        <button type="button" data-mode="semantic">Semantic</button>
        <button type="button" data-mode="graph">Graph</button>
      </div>
      <label class="toggle"><input type="checkbox" id="compiled"> include Wiki/ pages</label>
    </div>
  </section>

  <div class="cols">
    <div class="results" id="results"><div class="empty">Type to search.</div></div>
    <aside class="reader" id="reader">
      <div class="rhead">
        <span class="rpath" id="rpath"></span>
        <button type="button" id="rclose" title="Close" aria-label="Close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="rbody"><article class="md" id="rmd"></article></div>
      <div class="rlinks" id="rlinks" hidden></div>
    </aside>
  </div>
</div>

<dialog id="tokendlg">
  <h2>Authentication</h2>
  <p>This instance is protected. Paste your API token (or log in via Cloudflare Access and reload).</p>
  <input id="token-input" type="password" placeholder="API token" autocomplete="off">
  <div class="actions">
    <button type="button" class="btn" id="token-cancel">Cancel</button>
    <button type="button" class="btn primary" id="token-save">Save</button>
  </div>
</dialog>

<script src="app.js"></script>
</body>
</html>
